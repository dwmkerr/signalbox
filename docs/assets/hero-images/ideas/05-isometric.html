<!doctype html>
<!--
  CONCEPT 5 - ISOMETRIC DESK

  A playful flat-design isometric scene (true 2:1 projection). A desk carries
  three monitors, each running a stylized agent session: Claude Code (rust
  sunburst mark, amber "asking" dot glowing), pi (blue π mark, working
  spinner), and opencode (terminal with green chevrons, blue "done" dot).
  Floating above the desk is the signalbox board as an isometric panel with
  five compact rows - amber ask first - each row carrying the agent glyph and
  status mark from the jumplist spec. Dotted lines run from each monitor to
  its row on the board, and a tiny beacon on the board's top edge radiates
  arc waves. One gentle ambient animation: the amber ask dots and the beacon
  pulse together. Stripe/Notion illustration energy, dark theme.

  Iso conventions used throughout (2:1):
    isoX = (1, .5) down-right, isoY = (-1, .5) down-left, up = (0, -1)
    top faces:            matrix(1, .5, -1, .5, tx, ty)
    front faces (screens): matrix(1, .5,  0,  1, tx, ty)  - face lower-left
    right-end faces:      matrix(1,-.5,  0,  1, tx, ty)  - face lower-right
-->
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>signalbox - isometric desk hero</title>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0d0f; min-height:100vh; display:flex; flex-direction:column;
         align-items:center; justify-content:center; padding:36px 20px 56px;
         font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif; }
  .hero { width:100%; max-width:1100px; }
  svg.scene { display:block; width:100%; height:auto; }
  .lockup { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:6px; }
  .lockup .name { color:#EDEDED; font-size:21px; font-weight:650; letter-spacing:-.2px; }
  .lockup .tag  { color:#6E6E73; font-size:21px; font-weight:400; letter-spacing:-.2px; }
  @keyframes pulse { 0%,100% { opacity:1; }  50% { opacity:.3; } }
  @keyframes halo  { 0%,100% { opacity:.28; } 50% { opacity:.04; } }
  .pulse  { animation:pulse 2.8s ease-in-out infinite; }
  .pulse2 { animation:pulse 2.8s ease-in-out infinite; animation-delay:.35s; }
  .halo   { animation:halo 2.8s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .pulse, .pulse2, .halo { animation:none; }
  }
</style></head><body>

</svg>

</div>
</div>
